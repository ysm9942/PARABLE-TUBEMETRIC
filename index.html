<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parable TubeMetric - 유튜브 성과 분석 시스템</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Pretendard Variable', 'Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
        /* ── 라이트 테마 변수 ─────────────────────────────────────── */
        :root {
            --bg-page:      #f2f3f8;
            --bg-sidebar:   #ffffff;
            --bg-card:      #ffffff;
            --bg-input:     #f5f6fc;
            --bg-hover:     rgba(0,0,0,0.04);
            --border:       #e2e3ef;
            --border-md:    #d0d2e4;
            --text-heading: #0f0f23;
            --text-body:    #2a2a42;
            --text-sub:     #5c5c7c;
            --text-muted:   #8f8fac;
            --text-dim:     #b0b0c8;
            --accent:       #6d28d9;
            --accent-soft:  rgba(109,40,217,0.08);
        }

        *, *::before, *::after { box-sizing: border-box; }

        html, body, #root {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-body);
            font-size: 14px;
            line-height: 1.5;
            font-feature-settings: 'tnum' on, 'lnum' on;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
        }

        input, textarea, [contenteditable="true"] {
            -webkit-user-select: auto !important;
            user-select: auto !important;
        }

        /* ── 스크롤바 ──────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(109,40,217,0.18);
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(109,40,217,0.30); }

        /* ── 사이드바 활성 아이템 ──────────────────────────────── */
        .nav-active {
            background: linear-gradient(90deg, rgba(109,40,217,0.10) 0%, rgba(109,40,217,0.02) 100%);
            border-left: 2px solid #6d28d9;
            padding-left: 9px !important;
            color: #5b21b6 !important;
        }
        .nav-active svg { color: #6d28d9 !important; }

        /* ── 상태 dot ──────────────────────────────────────────── */
        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
            50%       { box-shadow: 0 0 0 4px rgba(16,185,129,0); }
        }
        .dot-live { animation: glow-pulse 2s ease-in-out infinite; }

        @keyframes bounce-x {
            0%, 100% { transform: translateX(0); }
            50%       { transform: translateX(5px); }
        }
        .animate-bounce-x { animation: bounce-x 1s infinite; }
    </style>
    <script>
        // 마우스 우클릭 차단
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        }, false);

        // 개발자 도구 및 소스보기 단축키 차단
        document.addEventListener('keydown', function(e) {
            // F12 차단
            if (e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C (개발자 도구 단축키) 차단
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
                e.preventDefault();
                return false;
            }
            // Ctrl+U (소스 보기) 차단
            if (e.ctrlKey && e.keyCode === 85) {
                e.preventDefault();
                return false;
            }
            // Mac용 단축키 대응 (Cmd + Opt + I 등)
            if (e.metaKey && e.altKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
                e.preventDefault();
                return false;
            }
        }, false);
    </script>
<script type="importmap">
{
  "imports": {
    "xlsx": "https://esm.sh/xlsx@^0.18.5",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "vite": "https://esm.sh/vite@^7.3.1",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "axios": "https://esm.sh/axios@^1.13.2"
  }
}
</script>
</head>
<body class="antialiased">
    <div id="root"></div>
    <!-- Vite entry point: index.tsx를 모듈로 로드합니다. -->
    <script type="module" src="/index.tsx"></script>
</body>
</html>
