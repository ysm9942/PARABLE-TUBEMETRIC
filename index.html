<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parable TubeMetric - 유튜브 성과 분석 시스템</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Pretendard Variable', 'Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
            },
            colors: {
              surface: {
                base:    '#05050e',
                sidebar: '#08081a',
                card:    '#0c0c22',
                raised:  '#111132',
                modal:   '#13133a',
              }
            }
          }
        }
      }
    </script>
    <style>
        :root {
            --bg-base:      #05050e;
            --bg-sidebar:   #08081a;
            --bg-card:      #0c0c22;
            --bg-raised:    #111132;
            --border:       rgba(255,255,255,0.09);
            --border-md:    rgba(255,255,255,0.14);
            --border-lg:    rgba(255,255,255,0.20);
            --text-primary: #f1f1f8;
            --text-secondary: #9494b8;
            --text-muted:   #5c5c7a;
            --accent:       #818cf8;
        }

        * { box-sizing: border-box; }

        html { font-size: 14px; }

        body {
            font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-feature-settings: 'tnum' on, 'lnum' on;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        input, textarea, [contenteditable="true"] {
            -webkit-user-select: auto !important;
            -moz-user-select: auto !important;
            -ms-user-select: auto !important;
            user-select: auto !important;
        }

        /* ── scrollbar ─────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(129,140,248,0.20);
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(129,140,248,0.38);
        }

        /* ── glow pulse for status dot ──────────────────────────── */
        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(52,211,153,0.5); }
            50%       { box-shadow: 0 0 0 4px rgba(52,211,153,0); }
        }
        .dot-live { animation: glow-pulse 2s ease-in-out infinite; }

        /* ── sidebar gradient active item ───────────────────────── */
        .nav-active {
            background: linear-gradient(90deg, rgba(129,140,248,0.18) 0%, rgba(129,140,248,0.04) 100%);
            border-left: 2px solid #818cf8;
            padding-left: 9px;
        }

        /* ── bounce-x ───────────────────────────────────────────── */
        @keyframes bounce-x {
            0%, 100% { transform: translateX(0); }
            50%       { transform: translateX(5px); }
        }
        .animate-bounce-x { animation: bounce-x 1s infinite; }

        /* ── number font on tables ──────────────────────────────── */
        .tabular-nums { font-variant-numeric: tabular-nums; }
    </style>
    <script>
        // 마우스 우클릭 차단
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        }, false);

        // 개발자 도구 및 소스보기 단축키 차단
        document.addEventListener('keydown', function(e) {
            // F12 차단
            if (e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C (개발자 도구 단축키) 차단
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
                e.preventDefault();
                return false;
            }
            // Ctrl+U (소스 보기) 차단
            if (e.ctrlKey && e.keyCode === 85) {
                e.preventDefault();
                return false;
            }
            // Mac용 단축키 대응 (Cmd + Opt + I 등)
            if (e.metaKey && e.altKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
                e.preventDefault();
                return false;
            }
        }, false);
    </script>
<script type="importmap">
{
  "imports": {
    "xlsx": "https://esm.sh/xlsx@^0.18.5",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "vite": "https://esm.sh/vite@^7.3.1",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "axios": "https://esm.sh/axios@^1.13.2"
  }
}
</script>
</head>
<body class="antialiased overflow-hidden">
    <div id="root"></div>
    <!-- Vite entry point: index.tsx를 모듈로 로드합니다. -->
    <script type="module" src="/index.tsx"></script>
</body>
</html>
