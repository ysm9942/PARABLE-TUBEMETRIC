name: Build Local Agent Installer

on:
  push:
    branches: [main]
    paths:
      - "installer/**"
      - "backend/**"
      - "scraper/**"
  workflow_dispatch:   # 수동 실행 가능

jobs:
  # ─── Windows .exe 인스톨러 빌드 ───────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip 패키지 설치
        run: |
          pip install pyinstaller
          pip install -r backend/requirements.txt

      - name: PyInstaller 빌드
        working-directory: installer
        run: pyinstaller tubemetric.spec --clean

      - name: Inno Setup 인스톨러 빌드
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/setup.iss
          options: /O"installer/Output"

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/Output/TubeMetric-Agent-Setup-Windows.exe
          retention-days: 7

  # ─── macOS .pkg 인스톨러 빌드 ─────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip 패키지 설치
        run: |
          pip install pyinstaller
          pip install -r backend/requirements.txt

      - name: macOS PKG 빌드
        working-directory: installer
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: installer/dist/TubeMetric-Agent-Setup-macOS.pkg
          retention-days: 7

  # ─── SoftC Scraper Windows .exe 빌드 ─────────────────────────────────────
  build-softc-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip 패키지 설치
        run: |
          pip install pyinstaller
          pip install fastapi uvicorn[standard] pydantic undetected-chromedriver selenium beautifulsoup4 lxml

      - name: PyInstaller 빌드
        working-directory: installer
        run: pyinstaller softc_scraper.spec --clean

      - name: Inno Setup 인스톨러 빌드
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/setup_softc.iss
          options: /O"installer/Output"

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: softc-windows-installer
          path: installer/Output/TubeMetric-SoftC-Scraper-Setup-Windows.exe
          retention-days: 7

  # ─── SoftC Scraper macOS .pkg 빌드 ────────────────────────────────────────
  build-softc-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip 패키지 설치
        run: |
          pip install pyinstaller
          pip install fastapi uvicorn[standard] pydantic undetected-chromedriver selenium beautifulsoup4 lxml

      - name: macOS PKG 빌드
        working-directory: installer
        run: |
          chmod +x build_softc_macos.sh
          ./build_softc_macos.sh

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: softc-macos-installer
          path: installer/dist/TubeMetric-SoftC-Scraper-Setup-macOS.pkg
          retention-days: 7

  # ─── Instagram Scraper Windows .exe 빌드 ────────────────────────────────
  build-instagram-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip 패키지 설치
        run: |
          pip install pyinstaller
          pip install fastapi uvicorn[standard] pydantic undetected-chromedriver selenium python-dotenv

      - name: PyInstaller 빌드
        working-directory: installer
        run: pyinstaller instagram_scraper.spec --clean

      - name: Inno Setup 인스톨러 빌드
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/setup_instagram.iss
          options: /O"installer/Output"

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: instagram-windows-installer
          path: installer/Output/TubeMetric-Instagram-Agent-Setup-Windows.exe
          retention-days: 7

  # ─── Instagram Scraper macOS .pkg 빌드 ───────────────────────────────────
  build-instagram-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip 패키지 설치
        run: |
          pip install pyinstaller
          pip install fastapi uvicorn[standard] pydantic undetected-chromedriver selenium python-dotenv

      - name: macOS PKG 빌드
        working-directory: installer
        run: |
          chmod +x build_instagram_macos.sh
          ./build_instagram_macos.sh

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: instagram-macos-installer
          path: installer/dist/TubeMetric-Instagram-Agent-Setup-macOS.pkg
          retention-days: 7

  # ─── GitHub Release에 인스톨러 배포 ──────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-softc-windows, build-softc-macos, build-instagram-windows, build-instagram-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 파일 목록 확인
        run: find artifacts -type f

      - name: GitHub Release 생성 / 업데이트
        uses: softprops/action-gh-release@v2
        with:
          tag_name: local-agent-latest
          name: "TubeMetric Local Agent (최신)"
          body: |
            ## TubeMetric Local Agent 설치 방법

            1. 아래에서 본인 OS에 맞는 파일을 다운로드하세요
            2. 실행 후 "다음" 클릭으로 설치 완료
            3. TubeMetric 사이트에서 라이브 지표 수집이 가능해집니다

            | OS | 파일 |
            |---|---|
            | Windows 10/11 | `TubeMetric-Agent-Setup-Windows.exe` |
            | macOS (Intel/Apple Silicon) | `TubeMetric-Agent-Setup-macOS.pkg` |

            > 설치 후 첫 실행 시 Playwright Chromium (~150MB)을 자동으로 다운로드합니다.

            ---

            ## TubeMetric SoftC Scraper (로컬 에이전트) 설치 방법

            1. 아래에서 본인 OS에 맞는 파일을 다운로드하세요
            2. 실행 후 "다음" 클릭으로 설치 완료
            3. **별도 설치 불필요** — 실행 즉시 포트 8002에서 서버 시작
            4. TubeMetric 사이트의 [라이브 지표 분석] → [로컬 에이전트] 탭에서 수집 가능

            | OS | 파일 |
            |---|---|
            | Windows 10/11 | `TubeMetric-SoftC-Scraper-Setup-Windows.exe` |
            | macOS (Intel/Apple Silicon) | `TubeMetric-SoftC-Scraper-Setup-macOS.pkg` |

            > PC에 Chrome이 설치되어 있어야 합니다 (Chrome 자동 감지).
            > headless=False · undetected_chromedriver 기반 bot 감지 우회 수집

            ---

            ## TubeMetric Instagram Scraper (로컬 에이전트) 설치 방법

            1. 아래에서 본인 OS에 맞는 파일을 다운로드하세요
            2. 실행 후 "다음" 클릭으로 설치 완료
            3. **별도 설치 불필요** — 실행 즉시 포트 8003에서 서버 시작
            4. TubeMetric 사이트의 [Instagram 분석] 탭에서 로컬 에이전트 모드로 수집 가능

            | OS | 파일 |
            |---|---|
            | Windows 10/11 | `TubeMetric-Instagram-Agent-Setup-Windows.exe` |
            | macOS (Intel/Apple Silicon) | `TubeMetric-Instagram-Agent-Setup-macOS.pkg` |

            > PC에 Chrome이 설치되어 있어야 합니다.
            > GitHub 토큰 없이 즉시 수집 가능
          files: |
            artifacts/windows-installer/TubeMetric-Agent-Setup-Windows.exe
            artifacts/macos-installer/TubeMetric-Agent-Setup-macOS.pkg
            artifacts/softc-windows-installer/TubeMetric-SoftC-Scraper-Setup-Windows.exe
            artifacts/softc-macos-installer/TubeMetric-SoftC-Scraper-Setup-macOS.pkg
            artifacts/instagram-windows-installer/TubeMetric-Instagram-Agent-Setup-Windows.exe
            artifacts/instagram-macos-installer/TubeMetric-Instagram-Agent-Setup-macOS.pkg
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
