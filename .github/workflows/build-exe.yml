name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'           # v1.0.0 같은 태그 push 시 자동 빌드+릴리스
  workflow_dispatch:   # Actions 탭에서 수동 실행 버튼

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r scraper/requirements.txt

      - name: Inject token into config.py
        # SCRAPER_TOKEN_B64 시크릿: base64 인코딩된 GitHub PAT
        # 만드는 법: python -c "import base64; print(base64.b64encode(b'ghp_토큰').decode())"
        shell: python
        env:
          SCRAPER_TOKEN_B64: ${{ secrets.SCRAPER_TOKEN_B64 }}
        run: |
          import os
          token_b64 = os.environ.get("SCRAPER_TOKEN_B64", "")
          content = f'''import base64

_GITHUB_TOKEN_B64 = "{token_b64}"
GITHUB_REPO       = "ysm9942/PARABLE-TUBEMETRIC"
GITHUB_BRANCH     = "main"

def get_github_token() -> str:
    if not _GITHUB_TOKEN_B64:
        return ""
    try:
        return base64.b64decode(_GITHUB_TOKEN_B64).decode()
    except Exception:
        return ""
'''
          with open("scraper/config.py", "w", encoding="utf-8") as f:
              f.write(content)
          print("config.py injected")

      - name: Build EXE
        shell: cmd
        run: |
          cd scraper
          pyinstaller PARABLE-TUBEMETRIC.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PARABLE-TUBEMETRIC-exe
          path: scraper/dist/PARABLE-TUBEMETRIC.exe
          retention-days: 90

      - name: Create GitHub Release (태그 push 시만)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: scraper/dist/PARABLE-TUBEMETRIC.exe
          body: |
            ## PARABLE-TUBEMETRIC 로컬 실행 파일

            ### 사용 방법
            1. `PARABLE-TUBEMETRIC.exe` 다운로드
            2. 더블클릭 → PIN 입력 (5350)
            3. 채널 핸들 등록 → 스크래핑 시작

            ### 주의사항
            - Google Chrome이 설치되어 있어야 합니다
            - Windows Defender 경고 시: "추가 정보" → "실행" 클릭
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
