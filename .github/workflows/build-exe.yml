name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'        # v1.0.0 같은 태그 push 시 자동 빌드+릴리스
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r scraper/requirements.txt
        shell: cmd

      - name: Build EXE
        run: |
          cd scraper
          pyinstaller PARABLE-TUBEMETRIC.spec
        shell: cmd

      - name: Upload artifact (항상 보관)
        uses: actions/upload-artifact@v4
        with:
          name: PARABLE-TUBEMETRIC-exe
          path: scraper/dist/PARABLE-TUBEMETRIC.exe
          retention-days: 30

      - name: Create GitHub Release (태그 push 시만)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: scraper/dist/PARABLE-TUBEMETRIC.exe
          body: |
            ## PARABLE-TUBEMETRIC 로컬 실행 파일

            ### 설치 방법
            1. `PARABLE-TUBEMETRIC.exe` 다운로드
            2. 원하는 폴더에 압축 해제 또는 실행
            3. 같은 폴더에 `.env` 파일 생성:
               ```
               GITHUB_TOKEN=ghp_...
               GITHUB_REPO=ysm9942/PARABLE-TUBEMETRIC
               ```
            4. `PARABLE-TUBEMETRIC.exe` 더블클릭

            ### 주의사항
            - Google Chrome이 설치되어 있어야 합니다
            - Windows Defender가 경고를 표시할 수 있습니다 (서명 없는 앱) → "추가 정보" → "실행" 클릭
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
